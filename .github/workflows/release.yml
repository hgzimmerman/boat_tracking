name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Build (server only)
        run: cargo build --release

      - name: Download Tailwind CSS standalone CLI
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.19/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64

      - name: Build Tailwind CSS
        run: ./tailwindcss-linux-x64 -i input.css -o public/tailwind.css --minify

      - name: Package artifact
        run: |
          mkdir -p staging/boat-tracking-linux
          cp target/release/boat_tracking staging/boat-tracking-linux/
          cp -r public staging/boat-tracking-linux/
          tar -czf boat-tracking-linux.tar.gz -C staging boat-tracking-linux

      - name: Upload artifact to workflow
        uses: actions/upload-artifact@v5
        with:
          name: boat-tracking-linux
          path: staging/boat-tracking-linux/

      - name: Upload artifact to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" boat-tracking-linux.tar.gz

  build-windows-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Download Tailwind CSS standalone CLI
        run: Invoke-WebRequest -Uri "https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.19/tailwindcss-windows-x64.exe" -OutFile "tailwindcss.exe"

      - name: Build Tailwind CSS
        run: .\tailwindcss.exe -i input.css -o public/tailwind.css --minify

      - name: Build Tauri app
        run: cargo build --release --features tauri

      - name: Package artifact
        run: |
          New-Item -ItemType Directory -Force staging/boat-tracking-windows
          Copy-Item target/release/boat_tracking.exe staging/boat-tracking-windows/
          Copy-Item -Recurse public staging/boat-tracking-windows/
          Compress-Archive -Path staging/boat-tracking-windows -DestinationPath boat-tracking-windows.zip

      - name: Upload artifact to workflow
        uses: actions/upload-artifact@v5
        with:
          name: boat-tracking-windows
          path: staging/boat-tracking-windows/

      - name: Upload artifact to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" boat-tracking-windows.zip
