name: Build

on:
  push:
    branches: [master, feature/*]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Build (server only)
        run: cargo build --release

      - name: Build Tailwind CSS
        run: |
          npx tailwindcss -i input.css -o public/tailwind.css --minify

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boat-tracking-linux
          path: |
            target/release/boat_tracking
            public/

  build-windows-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Tailwind CSS
        run: npx tailwindcss -i input.css -o public/tailwind.css --minify

      - name: Build Tauri app
        run: cargo build --release --features tauri

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boat-tracking-windows
          path: |
            target/release/boat_tracking.exe
            public/
