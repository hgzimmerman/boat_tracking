name: Auto Release

on:
  push:
    branches: [master]
    paths:
      - "Cargo.toml"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.version.outputs.tag_name }}
      created: ${{ steps.check_tag.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@v5

      - name: Read version from Cargo.toml
        id: version
        run: |
          version=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "tag_name=v$version" >> "$GITHUB_OUTPUT"
          echo "Found version: $version"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag_name }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag_name }}" \
            --title "${{ steps.version.outputs.tag_name }}" \
            --generate-notes

  build:
    needs: create-release
    if: needs.create-release.outputs.created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag_name: ${{ needs.create-release.outputs.tag_name }}
